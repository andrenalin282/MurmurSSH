name: Feature Request
description: Suggest an improvement or new feature for MurmurSSH
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [ROADMAP](../ROADMAP.md) and existing issues to see if this has already been discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you are running into.
      placeholder: I find it difficult to ... because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Keep it concrete and focused.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there other ways this could be solved?

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      options:
        - SFTP file browser
        - SSH session / terminal
        - Profile management
        - Credential handling
        - Settings / configuration
        - UI / theme
        - Documentation
        - Build / packaging
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — screenshots, links, prior discussions.
