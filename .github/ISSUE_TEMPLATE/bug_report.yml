name: Bug Report
description: Report a bug or unexpected behavior in MurmurSSH
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open profile editor
        2. Set auth type to ...
        3. Click Connect
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MurmurSSH version
      placeholder: e.g. v0.1.0 or "built from source on main"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: System environment
      description: OS, desktop environment, terminal emulator
      placeholder: |
        OS: Ubuntu 24.04
        Desktop: GNOME 46
        Terminal: gnome-terminal
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any error output here. Wrap in backticks if needed.
      render: text
